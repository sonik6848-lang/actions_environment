# Workflow name
name: create-cloudformation-stack

# Triggers for the workflow
on:
  # Manual trigger using the workflow_dispatch event
  workflow_dispatch:
jobs: # Jobs defined in the workflow
  create-stack:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v3
   
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{secrets.AWS_SESSION_TOKEN}}
        aws-region: us-east-1

       # ✅ Add this step to clean up ROLLBACK_COMPLETE stack
    - name: Delete stack if in ROLLBACK_COMPLETE state
      run: |
        STATUS=$(aws cloudformation describe-stacks \
          --stack-name udatest \
          --query "Stacks[0].StackStatus" \
          --output text 2>/dev/null || echo "DOES_NOT_EXIST")

        echo "Current stack status: $STATUS"

        if [ "$STATUS" = "ROLLBACK_COMPLETE" ]; then
          echo "Stack is in ROLLBACK_COMPLETE. Deleting..."
          aws cloudformation delete-stack --stack-name udatest
          aws cloudformation wait stack-delete-complete --stack-name udatest
          echo "Stack deleted successfully."
        else
          echo "No deletion needed. Proceeding..."
        fi


    - name: Create CloudFormation Stack
      uses: aws-actions/aws-cloudformation-github-deploy@v1
      with:
        name: udatest
        template: udatest.yml
        no-fail-on-empty-changeset: "1"

    - name: Check stack failure reason
      run: |
        aws cloudformation describe-stack-events \
          --stack-name udatest \
          --region us-east-1 \
          --query "StackEvents[?ResourceStatus=='CREATE_FAILED'].{Resource:LogicalResourceId, Reason:ResourceStatusReason}" \
          --output table
        
